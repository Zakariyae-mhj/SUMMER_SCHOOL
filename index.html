<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer School 2026 - Call for Applications</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 20px 0;
        }
        .ad-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .apply-btn-container {
            margin: 40px 0;
        }
        .apply-btn {
            background-color: #0056b3;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .apply-btn:hover {
            background-color: #003d82;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Script to load images 1 to 13 automatically -->
        <script>
            for (let i = 1; i <= 13; i++) {
                document.write('<img src="' + i + '.png" class="ad-image" alt="Page ' + i + '">');
            }
        </script>

        <div class="apply-btn-container">
            <a href="apply.html" class="apply-btn">Apply Now</a>
        </div>
    </div>

</body>
</html>
